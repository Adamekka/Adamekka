name: Sync contacts

on:
    push:
        branches:
            - main
    schedule:
        - cron: "0 0 * * *" # Runs once daily at midnight
    workflow_dispatch:

jobs:
    sync:
        runs-on: ubuntu-latest
        permissions:
            contents: write
        steps:
            - uses: actions/checkout@v6

            - name: Fetch contacts
              run: curl -sSL
                  https://raw.githubusercontent.com/Adamekka/contacts/main/contacts.md
                  -o /tmp/contacts.md

            - name: Checkout contacts repository
              uses: actions/checkout@v6
              with:
                  repository: Adamekka/contacts
                  ref: main
                  path: .contacts-source

            - name: Sync SVGs
              run: |
                  if [ -d .contacts-source/svgs ]; then
                      mkdir -p svgs
                      rsync -a --delete .contacts-source/svgs/ svgs/
                  else
                      rm -rf svgs
                  fi

            - name: Replace between markers
              run: |
                  python3 <<'PY'
                  import re, pathlib
                  readme = pathlib.Path("README.md").read_text()
                  contacts = pathlib.Path("/tmp/contacts.md").read_text().strip()
                  new = re.sub(
                      r"(<!-- CONTACTS:START -->)(.*?)(<!-- CONTACTS:END -->)",
                      lambda m: f"{m.group(1)}\n\n{contacts}\n\n{m.group(3)}",
                      readme, flags=re.DOTALL,
                  )
                  pathlib.Path("README.md").write_text(new)
                  PY

            - name: Commit if changed
              run: |
                  git config user.name  'github-actions[bot]'
                  git config user.email 'github-actions[bot]@users.noreply.github.com'
                  git add README.md
                  if [ -d svgs ] || [ -n "$(git ls-files svgs)" ]; then
                      git add -A svgs
                  fi
                  git diff --cached --quiet || git commit -m 'Sync contacts'
                  git push
