name: Update README cards

on:
  push:
    branches:
      - main
  schedule:
    - cron: "0 0 * * *" # Runs once daily at midnight
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Verify stats token
        env:
          README_STATS_TOKEN: ${{ secrets.README_STATS_TOKEN }}
        run: |
          if [[ -z "$README_STATS_TOKEN" ]]; then
            echo "::error::README_STATS_TOKEN repository secret is required for private repository stats"
            exit 1
          fi

      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6.1.0

      - name: Generate stats card
        uses: readme-tools/github-readme-stats-action@f9d8133845f40d659a754f78b8484983ba766448 # v2.0.1
        with:
          card: stats
          options: username=${{ github.repository_owner }}&count_private=true&show_icons=true&theme=nord&exclude_repo=Anomalous-Coffee-Machine,Assassin-s-Creed,BLACK-SOULS,CorpseParty,cult-of-the-lamb,DevilMayCry,Dolphin,DuckStation,Gopher64,LordOfTheMysteriesLN,MiSideFull,MonogatariLN,MushokuTenseiLN,nunholy,omori,omori_old,PCSX2,PPSSPP,RetroArch,ReZeroLN,RPCS3,SaveScummer,shadPS4,TheBook
          path: profile/stats.svg
          token: ${{ secrets.README_STATS_TOKEN }}

      - name: Generate top languages card
        uses: readme-tools/github-readme-stats-action@f9d8133845f40d659a754f78b8484983ba766448 # v2.0.1
        with:
          card: top-langs
          options: username=${{ github.repository_owner }}&theme=nord&exclude_repo=apps-mcu-lcd,DiscordTheme,ds-project,dungeon-looter,dwm,fish,java2,mpv,notes,nur-packages,nur-packages-old,nvim,nvim-old,opencode,pebor-nvim,SecureVPN,skj,skj-project,spins-backend,spins-frontend,st,std,stoneblock-cpp,uro,uro-project,usage,usage-old&langs_count=1000
          path: profile/top-langs.svg
          token: ${{ secrets.README_STATS_TOKEN }}

      - name: Commit cards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/*.svg
          git commit -m "Update README cards" || exit 0
          git push
